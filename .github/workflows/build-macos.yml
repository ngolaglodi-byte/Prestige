name: Build macOS Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.3'
        host: mac
        target: desktop
        arch: clang_64
        modules: qtmultimedia qtshadertools
        cache: true

    - name: Install dependencies
      run: |
        brew install zeromq ffmpeg ninja pkg-config create-dmg
        # ONNX Runtime
        wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.17.0/onnxruntime-osx-arm64-1.17.0.tgz
        tar xzf onnxruntime-osx-arm64-1.17.0.tgz
        echo "ONNXRUNTIME_DIR=$(pwd)/onnxruntime-osx-arm64-1.17.0" >> $GITHUB_ENV

    - name: Build
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
          -DONNXRUNTIME_LIB="${ONNXRUNTIME_DIR}/lib/libonnxruntime.dylib" \
          -DONNXRUNTIME_INC="${ONNXRUNTIME_DIR}/include" \
          -Wno-dev
        cmake --build build --parallel

    - name: Create app bundle
      run: |
        APP="dist/Prestige AI.app"
        mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources" "$APP/Contents/Frameworks"

        # Core executables
        cp build/control_room/prestige_control "$APP/Contents/MacOS/"
        cp build/vision_engine/prestige_vision "$APP/Contents/MacOS/"

        # Info.plist and icon
        cp scripts/Info.plist "$APP/Contents/Info.plist"
        [ -f resources/prestige.icns ] && cp resources/prestige.icns "$APP/Contents/Resources/AppIcon.icns"

        # ONNX Runtime dylib
        cp "${ONNXRUNTIME_DIR}/lib/libonnxruntime."*.dylib "$APP/Contents/Frameworks/"

        # FFmpeg dylibs (for RTMP/SRT/File output)
        for lib in avcodec avformat avutil swscale swresample; do
          DYLIB=$(find /opt/homebrew/lib /usr/local/lib -name "lib${lib}.*.dylib" -not -name "*.dSYM" 2>/dev/null | head -1)
          if [ -n "$DYLIB" ]; then
            cp "$DYLIB" "$APP/Contents/Frameworks/"
          fi
        done

        # ZeroMQ dylib
        ZMQLIB=$(find /opt/homebrew/lib /usr/local/lib -name "libzmq.*.dylib" 2>/dev/null | head -1)
        [ -n "$ZMQLIB" ] && cp "$ZMQLIB" "$APP/Contents/Frameworks/"
        # Fix rpath
        install_name_tool -add_rpath @executable_path/../Frameworks "$APP/Contents/MacOS/prestige_vision" 2>/dev/null || true
        install_name_tool -add_rpath @executable_path/../Frameworks "$APP/Contents/MacOS/prestige_control" 2>/dev/null || true

        # AI Models (ONNX files — same models, no Python needed)
        mkdir -p "$APP/Contents/Resources/models/buffalo_l"
        if [ -d "ai_engine/models/buffalo_l" ]; then
            cp ai_engine/models/buffalo_l/*.onnx "$APP/Contents/Resources/models/buffalo_l/" 2>/dev/null || true
        fi

    - name: Bundle Qt frameworks
      run: |
        APP="dist/Prestige AI.app"
        MACDEPLOYQT=$(find "${QT_ROOT_DIR}" -name macdeployqt -type f 2>/dev/null | head -1)
        if [ -n "$MACDEPLOYQT" ]; then
          "$MACDEPLOYQT" "$APP" \
            -executable="$APP/Contents/MacOS/prestige_vision" \
            -qmldir=control_room/qml \
            -qmldir=vision_engine/qml \
            -always-overwrite 2>&1 || true
        fi
        codesign --force --deep --sign - "$APP" 2>/dev/null || true

    - name: Create professional DMG
      run: |
        create-dmg \
          --volname "Prestige AI" \
          --volicon "resources/prestige.icns" \
          --window-pos 200 120 \
          --window-size 660 400 \
          --icon-size 80 \
          --icon "Prestige AI.app" 180 200 \
          --app-drop-link 480 200 \
          --hide-extension "Prestige AI.app" \
          --no-internet-enable \
          "dist/PrestigeAI-1.0.0-macOS-arm64.dmg" \
          "dist/Prestige AI.app" \
        || {
          echo "create-dmg failed, using hdiutil..."
          STAGING="dist/staging"
          mkdir -p "$STAGING"
          cp -R "dist/Prestige AI.app" "$STAGING/"
          ln -sf /Applications "$STAGING/Applications"
          hdiutil create -volname "Prestige AI" -srcfolder "$STAGING" -ov -format UDZO "dist/PrestigeAI-1.0.0-macOS-arm64.dmg"
          rm -rf "$STAGING"
        }

    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: PrestigeAI-macOS-Installer
        path: dist/PrestigeAI-*.dmg
