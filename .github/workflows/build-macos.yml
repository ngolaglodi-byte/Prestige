name: Build macOS Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.3'
        host: mac
        target: desktop
        arch: clang_64
        cache: true

    - name: Install dependencies
      run: brew install zeromq ffmpeg ninja pkg-config

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${Qt6_DIR}"

    - name: Build
      run: cmake --build build --parallel

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python deps
      run: |
        python3 -m venv ai_engine/venv
        ai_engine/venv/bin/pip install --upgrade pip
        ai_engine/venv/bin/pip install insightface onnxruntime opencv-python-headless pyzmq numpy
        ai_engine/venv/bin/pip install faster-whisper sounddevice

    - name: Package DMG
      run: |
        export CMAKE_PREFIX_PATH="${Qt6_DIR}"
        bash scripts/package_mac.sh

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: PrestigeAI-macOS
        path: dist/PrestigeAI-*-macOS.dmg
