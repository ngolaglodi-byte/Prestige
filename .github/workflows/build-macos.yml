name: Build macOS Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  QT_VERSION: '6.7.2'
  BUILD_TYPE: Release

jobs:
  build-macos:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: mac
        target: desktop
        arch: clang_64
        modules: qtmultimedia
        cache: true

    - name: Install dependencies
      run: brew install zeromq ffmpeg ninja pkg-config

    - name: Configure CMake
      run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    - name: Build
      run: cmake --build build --parallel

    - name: Setup Python AI Engine
      run: |
        python3 -m venv ai_engine/venv
        ai_engine/venv/bin/pip install --upgrade pip
        ai_engine/venv/bin/pip install insightface onnxruntime opencv-python-headless pyzmq numpy
        ai_engine/venv/bin/pip install faster-whisper sounddevice

    - name: Package DMG
      run: bash scripts/package_mac.sh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: PrestigeAI-macOS
        path: dist/PrestigeAI-*-macOS.dmg
        retention-days: 30
