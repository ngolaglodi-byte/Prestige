name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.2'
        host: windows
        target: desktop
        arch: win64_msvc2022_64
        modules: qtmultimedia qtshadertools qt3d
        cache: true

    - name: Install dependencies (ZeroMQ + FFmpeg)
      run: vcpkg install zeromq:x64-windows ffmpeg[core,avcodec,avformat,swscale]:x64-windows

    - name: Install ONNX Runtime
      shell: pwsh
      run: |
        $version = "1.17.0"
        $url = "https://github.com/microsoft/onnxruntime/releases/download/v$version/onnxruntime-win-x64-$version.zip"
        Invoke-WebRequest -Uri $url -OutFile onnxruntime.zip
        Expand-Archive onnxruntime.zip -DestinationPath onnxruntime
        $dir = Get-ChildItem onnxruntime -Directory | Select-Object -First 1
        echo "ONNXRUNTIME_DIR=$($dir.FullName)" >> $env:GITHUB_ENV

    - name: Configure CMake
      shell: pwsh
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
          -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
          -DONNXRUNTIME_LIB="$env:ONNXRUNTIME_DIR\lib\onnxruntime.lib" `
          -DONNXRUNTIME_INC="$env:ONNXRUNTIME_DIR\include"

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Find executables
      shell: pwsh
      id: find-exe
      run: |
        $ctrl = Get-ChildItem -Recurse build -Filter prestige_control.exe | Select-Object -First 1
        $vis = Get-ChildItem -Recurse build -Filter prestige_vision.exe | Select-Object -First 1
        echo "CTRL=$($ctrl.FullName)" >> $env:GITHUB_OUTPUT
        echo "VIS=$($vis.FullName)" >> $env:GITHUB_OUTPUT

    - name: Package application
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist\PrestigeAI | Out-Null

        # Core executables
        Copy-Item "${{ steps.find-exe.outputs.CTRL }}" dist\PrestigeAI\prestige_control.exe
        Copy-Item "${{ steps.find-exe.outputs.VIS }}" dist\PrestigeAI\prestige_vision.exe

        # Qt dependencies
        $env:Path = "$env:QT_ROOT_DIR\bin;$env:Path"
        & windeployqt --qmldir control_room\qml --qmldir vision_engine\qml dist\PrestigeAI\prestige_control.exe
        & windeployqt dist\PrestigeAI\prestige_vision.exe

        # ONNX Runtime DLL
        Copy-Item "$env:ONNXRUNTIME_DIR\lib\onnxruntime.dll" dist\PrestigeAI\

        # FFmpeg DLLs (for RTMP/SRT/File output)
        $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
        Get-ChildItem "$vcpkgBin\av*.dll","$vcpkgBin\sw*.dll","$vcpkgBin\postproc*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName dist\PrestigeAI\
        }

        # ZeroMQ DLL
        Get-ChildItem "$vcpkgBin\libzmq*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName dist\PrestigeAI\
        }

        # AI Models
        New-Item -ItemType Directory -Force -Path dist\PrestigeAI\models\buffalo_l | Out-Null
        if (Test-Path "ai_engine\models\buffalo_l") {
            Copy-Item ai_engine\models\buffalo_l\*.onnx dist\PrestigeAI\models\buffalo_l\ -ErrorAction SilentlyContinue
        }

        # Icon
        Copy-Item resources\prestige.ico dist\PrestigeAI\

        # Compile Windows launcher (PrestigeAI.exe — starts both processes)
        # Use Visual Studio Developer environment for cl.exe
        $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsPath = & $vsWhere -latest -property installationPath
        $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"

        # Compile via cmd with vcvars environment
        cmd /c "`"$vcvars`" && cd scripts && cl /Fe:..\dist\PrestigeAI\PrestigeAI.exe launcher_windows.c /link /SUBSYSTEM:WINDOWS user32.lib"

        # Studio presets
        if (Test-Path "resources\studios") {
            Copy-Item -Recurse resources\studios dist\PrestigeAI\
        }

    - name: Create Inno Setup installer
      shell: pwsh
      run: |
        choco install innosetup -y --no-progress
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts\installer.iss

    - name: Upload Setup.exe
      uses: actions/upload-artifact@v4
      with:
        name: PrestigeAI-Windows-Setup
        path: dist/PrestigeAI-*-Setup-Windows-x64.exe
