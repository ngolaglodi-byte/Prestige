name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  QT_VERSION: '6.7.2'
  BUILD_TYPE: Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: windows
        target: desktop
        arch: win64_msvc2022_64
        modules: qtmultimedia
        cache: true

    - name: Install ZeroMQ (vcpkg)
      run: |
        vcpkg install zeromq:x64-windows

    - name: Configure CMake
      shell: pwsh
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Setup Python AI Engine
      run: |
        python -m venv ai_engine\venv
        ai_engine\venv\Scripts\pip install --upgrade pip
        ai_engine\venv\Scripts\pip install insightface onnxruntime opencv-python-headless pyzmq numpy
        ai_engine\venv\Scripts\pip install faster-whisper sounddevice

    - name: Package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist\PrestigeAI
        Copy-Item build\control_room\${{ env.BUILD_TYPE }}\prestige_control.exe dist\PrestigeAI\
        Copy-Item build\vision_engine\${{ env.BUILD_TYPE }}\prestige_vision.exe dist\PrestigeAI\
        & windeployqt --qmldir control_room\qml --qmldir vision_engine\qml dist\PrestigeAI\prestige_control.exe
        & windeployqt dist\PrestigeAI\prestige_vision.exe
        Copy-Item -Recurse ai_engine dist\PrestigeAI\ai_engine
        Copy-Item resources\prestige.ico dist\PrestigeAI\
        @"
        @echo off
        title Prestige AI
        start /B prestige_vision.exe
        timeout /t 2 /nobreak >nul
        start /B ai_engine\venv\Scripts\python.exe ai_engine\main.py
        timeout /t 2 /nobreak >nul
        prestige_control.exe
        taskkill /f /im prestige_vision.exe >nul 2>&1
        "@ | Out-File -Encoding ASCII dist\PrestigeAI\PrestigeAI.bat

    - name: Create ZIP
      shell: pwsh
      run: |
        Compress-Archive -Path dist\PrestigeAI -DestinationPath dist\PrestigeAI-Windows-x64.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: PrestigeAI-Windows-x64
        path: dist/PrestigeAI-Windows-x64.zip
        retention-days: 30
