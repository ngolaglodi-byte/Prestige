name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.3'
        host: windows
        target: desktop
        arch: win64_msvc2019_64
        modules: qtmultimedia qtshadertools
        cache: true

    - name: Install ZeroMQ
      run: vcpkg install zeromq:x64-windows

    - name: Configure CMake
      shell: pwsh
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python deps
      shell: pwsh
      run: |
        python -m venv ai_engine\venv
        ai_engine\venv\Scripts\pip install --upgrade pip
        ai_engine\venv\Scripts\pip install insightface onnxruntime opencv-python-headless pyzmq numpy
        ai_engine\venv\Scripts\pip install faster-whisper sounddevice

    - name: Package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist\PrestigeAI | Out-Null
        Copy-Item build\control_room\Release\prestige_control.exe dist\PrestigeAI\
        Copy-Item build\vision_engine\Release\prestige_vision.exe dist\PrestigeAI\
        & windeployqt --qmldir control_room\qml --qmldir vision_engine\qml dist\PrestigeAI\prestige_control.exe
        & windeployqt dist\PrestigeAI\prestige_vision.exe
        Copy-Item -Recurse ai_engine dist\PrestigeAI\ai_engine -Force
        Copy-Item resources\prestige.ico dist\PrestigeAI\
        Set-Content -Path dist\PrestigeAI\PrestigeAI.bat -Value @"
        @echo off
        title Prestige AI
        start /B prestige_vision.exe
        timeout /t 2 /nobreak >nul
        start /B ai_engine\venv\Scripts\python.exe ai_engine\main.py
        timeout /t 2 /nobreak >nul
        prestige_control.exe
        taskkill /f /im prestige_vision.exe >nul 2>&1
        "@

    - name: Create ZIP
      shell: pwsh
      run: Compress-Archive -Path dist\PrestigeAI -DestinationPath dist\PrestigeAI-Windows-x64.zip

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: PrestigeAI-Windows-x64
        path: dist/PrestigeAI-Windows-x64.zip
