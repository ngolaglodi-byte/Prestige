name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.3'
        host: windows
        target: desktop
        arch: win64_msvc2019_64
        modules: qtmultimedia qtshadertools
        cache: true

    - name: Install ZeroMQ
      run: vcpkg install zeromq:x64-windows

    - name: Configure CMake
      shell: pwsh
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
          -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Find executables
      shell: pwsh
      id: find-exe
      run: |
        $ctrl = Get-ChildItem -Recurse build -Filter prestige_control.exe | Select-Object -First 1
        $vis = Get-ChildItem -Recurse build -Filter prestige_vision.exe | Select-Object -First 1
        echo "CTRL=$($ctrl.FullName)" >> $env:GITHUB_OUTPUT
        echo "VIS=$($vis.FullName)" >> $env:GITHUB_OUTPUT

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python deps
      shell: pwsh
      run: |
        python -m venv ai_engine\venv
        ai_engine\venv\Scripts\pip install --upgrade pip
        ai_engine\venv\Scripts\pip install insightface onnxruntime opencv-python-headless pyzmq numpy
        ai_engine\venv\Scripts\pip install faster-whisper sounddevice

    - name: Package application
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist\PrestigeAI | Out-Null
        Copy-Item "${{ steps.find-exe.outputs.CTRL }}" dist\PrestigeAI\prestige_control.exe
        Copy-Item "${{ steps.find-exe.outputs.VIS }}" dist\PrestigeAI\prestige_vision.exe
        $env:Path = "$env:QT_ROOT_DIR\bin;$env:Path"
        & windeployqt --qmldir control_room\qml --qmldir vision_engine\qml dist\PrestigeAI\prestige_control.exe
        & windeployqt dist\PrestigeAI\prestige_vision.exe
        Copy-Item -Recurse ai_engine dist\PrestigeAI\ai_engine -Force
        Copy-Item resources\prestige.ico dist\PrestigeAI\

    - name: Compile native launcher (.exe with icon)
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
        rc /fo scripts\launcher.res scripts\launcher.rc
        cl /Fe:dist\PrestigeAI\PrestigeAI.exe scripts\launcher_windows.c scripts\launcher.res /link /SUBSYSTEM:WINDOWS user32.lib

    - name: Create Inno Setup installer
      shell: pwsh
      run: |
        choco install innosetup -y --no-progress
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts\installer.iss

    - name: Upload Setup.exe
      uses: actions/upload-artifact@v4
      with:
        name: PrestigeAI-Windows-Setup
        path: dist/PrestigeAI-*-Setup-Windows-x64.exe

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: PrestigeAI-Windows-ZIP
        path: dist/PrestigeAI-Windows-x64.zip

    - name: Create ZIP backup
      shell: pwsh
      run: Compress-Archive -Path dist\PrestigeAI -DestinationPath dist\PrestigeAI-Windows-x64.zip
